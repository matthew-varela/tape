name: Tape
options:
  bundleIdPrefix: com.tape
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.4"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
packages:
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: "8.0.0"
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "11.0.0"
targets:
  Tape:
    type: application
    platform: iOS
    sources:
      - path: Tape
    resources:
      - path: Tape/Resources
    settings:
      base:
        INFOPLIST_FILE: Tape/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.tape.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTED_INTERFACE_ORIENTATIONS: "UIInterfaceOrientationPortrait"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        NSCameraUsageDescription: "Tape needs camera access to record highlights"
        NSPhotoLibraryUsageDescription: "Tape needs photo library access to upload highlights"
        NSMicrophoneUsageDescription: "Tape needs microphone access to capture audio"
    dependencies:
      - package: Kingfisher
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
