spring.application.name=tape-api
server.port=${PORT:8080}

# Database -- Heroku sets DATABASE_URL; we parse it for Spring
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:h2:mem:tapedb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${JDBC_DATABASE_USERNAME:sa}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# AWS S3
aws.s3.bucket=${AWS_S3_BUCKET:tape-videos}
aws.s3.region=${AWS_S3_REGION:us-east-1}
aws.s3.access-key=${AWS_ACCESS_KEY_ID:}
aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY:}

# Firebase
firebase.credentials=${FIREBASE_CREDENTIALS:}

# CORS
cors.allowed-origins=${CORS_ORIGINS:*}
